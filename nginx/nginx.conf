client_max_body_size 200M;

upstream backend {
    server backend:8000;
}

upstream collabora_upstream {
    server collabora:9980;
}

server {
    listen 80;
    server_name _;

    # ── Collabora / LibreOffice Online ────────────────────────────────────────
    # Collabora serves its own static assets under /hosting/ and /browser/.
    location ^~ /hosting/ {
        proxy_pass http://collabora_upstream;
        proxy_set_header Host             $http_host;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Host  $http_host;
        proxy_set_header X-Forwarded-Port  8080;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location ^~ /browser/ {
        proxy_pass http://collabora_upstream;
        proxy_set_header Host             $http_host;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Host  $http_host;
        proxy_set_header X-Forwarded-Port  8080;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Collabora WebSocket connections (document editing channel).
    location ^~ /coolws/ {
        proxy_pass         http://collabora_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host             $http_host;
        proxy_set_header   X-Forwarded-Proto http;
        proxy_set_header   X-Forwarded-Host  $http_host;
        proxy_set_header   X-Forwarded-Port  8080;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering    off;
    }

    location ^~ /cool/ {
        proxy_pass         http://collabora_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host             $http_host;
        proxy_set_header   X-Forwarded-Proto http;
        proxy_set_header   X-Forwarded-Host  $http_host;
        proxy_set_header   X-Forwarded-Port  8080;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering    off;
    }

    # ── React SPA ─────────────────────────────────────────────────────────────
    # All requests to /ui/* are served from the built frontend/dist volume.
    # Unknown paths fall back to index.html so React Router handles deep links
    # and page refreshes without returning a 404 from nginx.
    #
    # Uses `root /var/www` (NOT alias) so that try_files and the nested exact
    # match for index.html both resolve to /var/www/ui/... correctly.
    # The frontend build must use base="/ui/" (set in vite.config.ts) so that
    # all generated asset paths start with /ui/assets/... matching this route.
    location = /index.html {
        root /var/www/ui;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location ^~ /assets/ {
        root /var/www/ui;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── WOPI (LibreOffice Online callbacks) ───────────────────────────────────
    # Collabora calls back to /wopi/files/... to read/write documents.
    # Needs long timeouts because file operations on large DOCX can take time.
    location ^~ /wopi/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host             $http_host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_read_timeout    300s;
        proxy_connect_timeout  60s;
        proxy_send_timeout    300s;
    }

    # ── API ───────────────────────────────────────────────────────────────────
    # All /api/ calls forwarded to FastAPI. Processing jobs can be slow
    # so read/send timeouts are intentionally generous.
    location ^~ /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host             $http_host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_read_timeout    300s;
        proxy_connect_timeout  60s;
        proxy_send_timeout    300s;
    }

    # ── Legacy SSR + static assets ────────────────────────────────────────────
    # Catch-all: everything else (legacy Jinja2 pages, /static/, /login, etc.)
    # is handled by the FastAPI backend.
    location / {
        root /var/www/ui;
        try_files $uri $uri/ /index.html;
    }
}
