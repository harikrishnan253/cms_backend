client_max_body_size 200M;

upstream backend {
    server backend:8000;
}

upstream collabora_upstream {
    server collabora:9980;
}

server {
    listen 80;
    server_name _;

    # -------------------- COLLABORA (MUST BE BEFORE /) --------------------

    # Discovery + capabilities
    location ^~ /hosting/ {
        proxy_pass http://collabora_upstream;
        proxy_set_header Host $host;

        # Force "external" scheme to HTTP
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  8080;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Collabora UI assets
    location ^~ /browser/ {
        proxy_pass http://collabora_upstream;
        proxy_set_header Host $host;

        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  8080;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Websocket endpoint (THIS is what the editor needs)
    location ^~ /coolws/ {
        proxy_pass http://collabora_upstream;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  8080;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # Some builds still request /cool/ static bits
    location ^~ /cool/ {
        proxy_pass http://collabora_upstream;
        proxy_set_header Host $host;

        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  8080;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -------------------- BACKEND --------------------
    location / {
        proxy_pass http://backend;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
    }
}
