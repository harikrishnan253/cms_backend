{% extends "base_tailwind.html" %}

{% block title %}Edit {{ filename }}{% endblock %}

{% block content %}
<div class="flex flex-col h-[calc(100vh-64px)] overflow-hidden bg-slate-100">

    <!-- Toolbar -->
    <div
        class="h-14 bg-white border-b border-slate-200 flex items-center justify-between px-6 shadow-sm z-20 flex-shrink-0">
        <div class="flex items-center gap-4">
            <i class="fas fa-file-word text-blue-600 text-xl"></i>
            <h1 class="text-lg font-semibold text-slate-800 truncate max-w-xl">{{ filename }}</h1>
            <span id="saveStatus"
                class="text-xs font-medium text-emerald-600 hidden bg-emerald-50 px-2 py-1 rounded-full border border-emerald-100">
                <i class="fas fa-check-circle me-1"></i> Saved
            </span>
        </div>

        <div class="flex items-center gap-3">
            <button onclick="window.history.back()"
                class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm rounded-lg font-medium transition-colors shadow-sm flex items-center gap-2 border border-slate-200">
                <i class="fas fa-arrow-left"></i> Exit Editor
            </button>
        </div>
    </div>

    <!-- LibreOffice Online iframe -->
    <div class="flex-1 relative">
        {% if collabora_url %}
        <iframe id="collaboraFrame" src="{{ collabora_url }}" class="w-full h-full border-0"
            allow="clipboard-read; clipboard-write" allowfullscreen>
        </iframe>
        {% else %}
        <div class="flex flex-col items-center justify-center h-full text-center p-12">
            <i class="fas fa-exclamation-triangle text-5xl text-amber-400 mb-4"></i>
            <h2 class="text-xl font-semibold text-slate-700 mb-2">Editor not available</h2>
            <p class="text-slate-500 mb-6">Collabora Online is not reachable.</p>
            <button onclick="window.history.back()"
                class="px-5 py-2.5 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-lg font-medium">
                Go Back
            </button>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
