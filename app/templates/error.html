{% extends "base_tailwind.html" %}

{% block title %}Error{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[calc(100vh-64px)] bg-slate-50">
    <div class="bg-white p-8 rounded-xl shadow-sm border border-slate-200 max-w-md w-full text-center">
        <div class="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-exclamation-triangle text-2xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-slate-800 mb-2">Something went wrong</h1>
        <p class="text-slate-600 mb-6">{{ error_message }}</p>
        <a href="javascript:history.back()"
            class="px-4 py-2 bg-slate-800 text-white rounded-lg hover:bg-slate-700 transition-colors">
            Go Back
        </a>
    </div>
</div>
{% endblock %}
