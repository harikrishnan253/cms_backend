{% extends "base_tailwind.html" %}

{% block title %}Change Password - Admin Panel{% endblock %}

{% block content %}
<div class="flex flex-col h-full p-8">
    <div class="flex justify-between items-center mb-8">
        <div>
            <h2 class="text-3xl font-bold text-slate-800">Change Password</h2>
            <p class="text-slate-500 mt-1">Update password for user: <strong class="text-emerald-600">{{ target_user.username }}</strong></p>
        </div>
        <a href="/admin/users" class="px-4 py-2 bg-white border border-slate-200 rounded-lg text-slate-600 hover:bg-slate-50 transition-colors shadow-sm flex items-center gap-2">
            <i class="fas fa-arrow-left"></i> Back to Users
        </a>
    </div>

    <div class="flex justify-center mt-8">
        <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-slate-100 p-8">
            <form method="POST" action="/admin/users/{{ target_user.id }}/password">
                <div class="text-center mb-8">
                    <div class="w-20 h-20 bg-gradient-to-br from-rose-400 to-pink-500 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                        <i class="fas fa-key text-white text-3xl"></i>
                    </div>
                    <h4 class="text-xl font-bold text-slate-800">Reset Password</h4>
                    <p class="text-slate-500 text-sm">Enter a new secure password</p>
                </div>

                <div class="mb-6">
                    <label for="new_password" class="block text-sm font-bold text-slate-600 uppercase mb-2">New Password <span class="text-rose-500">*</span></label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-slate-400"></i>
                        </div>
                        <input type="password" id="new_password" name="new_password" required class="block w-full pl-10 pr-4 py-2.5 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 bg-slate-50">
                    </div>
                </div>

                <button type="submit" class="w-full py-3 px-4 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl shadow-lg transition-colors flex items-center justify-center gap-2">
                    <i class="fas fa-save"></i> Update Password
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
