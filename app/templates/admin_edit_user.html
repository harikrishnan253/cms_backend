{% extends "base.html" %}
{% block content %}
<div class="max-w-lg mx-auto mt-10 bg-white p-8 rounded-xl border border-slate-200 shadow-sm">
    <h2 class="text-xl font-semibold text-slate-800 mb-6">Edit User: {{ target.username }}</h2>
    <form method="post" action="/admin/users/{{ target.id }}/edit" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
            <input type="email" name="email" value="{{ target.email or '' }}"
                class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
        </div>
        <div class="flex gap-3 pt-2">
            <button type="submit" class="px-4 py-2 bg-emerald-600 text-white rounded-lg text-sm hover:bg-emerald-700">Save Changes</button>
            <a href="/admin/users" class="px-4 py-2 bg-slate-100 text-slate-700 rounded-lg text-sm hover:bg-slate-200">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
